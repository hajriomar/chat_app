<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 0;
        }

        .register-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            width: 360px;
        }

        h1 {
            text-align: center;
            margin-bottom: 6px;
            font-size: 22px;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 13px;
            color: #374151;
        }

        .field {
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        input::placeholder {
            color: #9ca3af;
        }

        .pass-wrap {
            position: relative;
        }

        .pass-wrap input {
            padding-right: 40px;
        }

        .eye-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .eye-btn:hover {
            color: #6b7280;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            margin-top: 4px;
            transition: background 0.15s;
        }

        button[type="submit"]:hover {
            background: #1d4ed8;
        }

        button[type="submit"]:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        #message {
            margin-top: 14px;
            text-align: center;
            font-size: 13px;
            min-height: 20px;
            padding: 8px 12px;
            border-radius: 8px;
            display: none;
        }

        #message.success {
            display: block;
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        #message.error {
            display: block;
            background: #fff1f2;
            color: #dc2626;
            border: 1px solid #fecdd3;
        }

        .login-link {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #6b7280;
        }

        .login-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>Créer un compte</h1>
        <p class="subtitle">Rejoignez-nous en quelques secondes</p>

        <form id="register-form">
            <div class="field">
                <label for="full_name">Nom complet</label>
                <input type="text" id="full_name" name="full_name" placeholder="Jean Dupont" required>
            </div>

            <div class="field">
                <label for="email">Adresse e-mail</label>
                <input type="email" id="email" name="email" placeholder="jean@exemple.com" required>
            </div>

            <div class="field">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" placeholder="jean_dupont" required>
            </div>

            <div class="field">
                <label for="password">Mot de passe</label>
                <div class="pass-wrap">
                    <input type="password" id="password" name="password" placeholder="8 caractères minimum" required>
                    <button type="button" class="eye-btn" id="toggle-pass" aria-label="Afficher le mot de passe">
                        <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="submit-btn">S'inscrire</button>
        </form>

        <p id="message"></p>

        <div class="login-link">
            Déjà un compte ? <a href="/">Se connecter</a>
        </div>
    </div>

    <script>
        document.getElementById("toggle-pass").addEventListener("click", function () {
            const pw = document.getElementById("password");
            const icon = document.getElementById("eye-icon");
            if (pw.type === "password") {
                pw.type = "text";
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                pw.type = "password";
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        });

        document.getElementById("register-form").addEventListener("submit", async function (event) {
            event.preventDefault();

            const full_name = document.getElementById("full_name").value;
            const email = document.getElementById("email").value;
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const message = document.getElementById("message");
            const btn = document.getElementById("submit-btn");

            btn.textContent = "Inscription en cours...";
            btn.disabled = true;
            message.className = "";
            message.style.display = "none";

            try {
                const response = await fetch("/api/register/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ full_name, email, username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    message.textContent = "Inscription réussie ! Redirection...";
                    message.className = "success";
                    setTimeout(() => { window.location.href = "/"; }, 1500);
                } else {
                    message.textContent = data.error || "Erreur lors de l'inscription";
                    message.className = "error";
                    btn.textContent = "S'inscrire";
                    btn.disabled = false;
                }
            } catch (error) {
                message.textContent = "Erreur serveur, réessayez.";
                message.className = "error";
                btn.textContent = "S'inscrire";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
