        if (window.Notification && Notification.permission !== "granted") {

        function addMessageBubble(sender, message) {
            if (!message || message.trim() === "") return;

            const msgDiv = document.createElement('div');
            const isMe = sender.trim() === username.trim();

            msgDiv.classList.add('message');
            msgDiv.classList.add(isMe ? 'sent' : 'received');
            msgDiv.innerHTML = `<span class="sender-name">${sender}</span>${message}`;

            chatContainer.appendChild(msgDiv);

            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        const historyDataElem = document.getElementById('history-data');
        const historyData = historyDataElem ? historyDataElem.textContent : "";
        chatContainer.innerHTML = '';

        if (historyData && historyData.trim() !== "") {
            const lines = historyData.split('\n');
            lines.forEach(line => {
                if (line.includes(':')) {
                    const firstColonIndex = line.indexOf(':');
                    const s = line.substring(0, firstColonIndex).trim();
                    const m = line.substring(firstColonIndex + 1).trim();
                    if (s && m) addMessageBubble(s, m);
                }
            });
        }
