<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Conversation</title>
</head>
<body>
    <h1>Conversation</h1>
    <p id="conversation-id"></p>

    <div>
        <textarea id="chat-log" cols="100" rows="20" readonly></textarea>
    </div>

    <br>

    <input id="chat-message-input" type="text" placeholder="Votre message" size="80">
    <button id="chat-message-submit">Envoyer</button>
        
        
   <script>
    const conversationId = "{{ conversation_id }}";
    const params = new URLSearchParams(window.location.search);
    const username = params.get("username") || "anonymous";

    document.getElementById("conversation-id").textContent =
        "Conversation ID : " + conversationId;

    const socket = new WebSocket(
        `ws://${window.location.host}/ws/chat/${conversationId}/?username=${username}`
    );

    const chatLog = document.getElementById("chat-log");
    const messageInput = document.getElementById("chat-message-input");
    const submitButton = document.getElementById("chat-message-submit");

    socket.onopen = function () {
        console.log("WebSocket connecté");
    };

    socket.onmessage = function (event) {
        const data = JSON.parse(event.data);
        chatLog.value += `${data.sender}: ${data.message}\n`;
        chatLog.scrollTop = chatLog.scrollHeight;
    };

    socket.onclose = function () {
        console.log("WebSocket fermé");
    };

    submitButton.onclick = function () {
        const message = messageInput.value.trim();

        if (message !== "") {
            socket.send(JSON.stringify({
                message: message,
                sender: username
            }));
            messageInput.value = "";
        }
    };

    messageInput.addEventListener("keyup", function (event) {
        if (event.key === "Enter") {
            submitButton.click();
        }
    });
</script>
</body>
</html>
