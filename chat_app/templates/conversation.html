<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Conversation</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        .topbar {
            background: #1f2937;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            font-size: 20px;
            font-weight: bold;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 14px;
            max-width: 70%;
            padding: 12px 14px;
            border-radius: 12px;
        }

        .message.sent {
            background: #dbeafe;
            margin-left: auto;
            text-align: right;
        }

        .message.received {
            background: #e5e7eb;
            margin-right: auto;
        }

        .message-meta {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }

        .chat-input-bar {
            display: flex;
            gap: 10px;
            padding: 16px;
            border-top: 1px solid #eee;
            background: white;
        }

        .chat-input-bar input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .chat-input-bar button {
            padding: 12px 18px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .back-btn {
            background: white;
            color: #1f2937;
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div>Chat temps réel</div>
        <a class="back-btn" href="/home/?username={{ username }}">Retour</a>
    </div>

    <div class="chat-container">
        <div class="chat-header" id="chat-title">Conversation</div>

        <div class="messages-area" id="messages-area"></div>

        <div class="chat-input-bar">
            <input type="text" id="message-input" placeholder="Écrire un message..." />
            <button onclick="sendMessage()">Envoyer</button>
        </div>
    </div>

    <script>
        const username = "{{ username }}";
        const conversationId = "{{ conversation_id }}";

        const messagesArea = document.getElementById("messages-area");
        const messageInput = document.getElementById("message-input");

        function appendMessage(message) {
            const div = document.createElement("div");
            const isMine = message.sender_username === username;

            div.className = `message ${isMine ? "sent" : "received"}`;
            div.innerHTML = `
                <div>${message.content}</div>
                <div class="message-meta">
                    ${message.sender_username} - ${message.timestamp ? new Date(message.timestamp).toLocaleString() : ""}
                </div>
            `;

            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        async function loadOldMessages() {
            try {
                const response = await fetch(`/api/conversations/${conversationId}/messages/?username=${encodeURIComponent(username)}`);
                const data = await response.json();

                messagesArea.innerHTML = "";

                if (data.messages) {
                    data.messages.forEach(msg => appendMessage(msg));
                } else if (data.error) {
                    console.error(data.error);
                }
            } catch (error) {
                console.error("Erreur chargement messages :", error);
            }
        }

        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(`${protocol}://${window.location.host}/ws/chat/${conversationId}/`);

        socket.onopen = function() {
            console.log("WebSocket connecté");
        };

        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);

            if (data.error) {
                console.error("Erreur websocket :", data.error);
                return;
            }

            appendMessage(data);
        };

        socket.onclose = function() {
            console.log("WebSocket fermé");
        };

        function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            socket.send(JSON.stringify({
                username: username,
                content: content
            }));

            messageInput.value = "";
        }

        messageInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        });

        loadOldMessages();
    </script>
</body>
</html>
